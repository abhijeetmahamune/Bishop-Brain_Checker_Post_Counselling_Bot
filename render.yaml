# render.yaml - Deployment configuration for Render.com
services:
  - type: web
    name: brain-checker-api
    runtime: python-3.11
    plan: free
    
    # Build command - install dependencies avoiding Rust compilation
    buildCommand: |
      pip install --upgrade pip setuptools wheel && \
      pip install --no-cache-dir --prefer-binary -r backend/requirements.txt
    
    # Start command - run the FastAPI server
    startCommand: python backend/main.py
    
    # Environment variables
    envVars:
      - key: OPENROUTER_API_KEY
        scope: run
        sync: false
      - key: PORT
        value: 8000
      - key: PYTHONUNBUFFERED
        value: 1
    
    # Pre-deploy build script to ensure Python 3.11
    preDeployCommand: |
      python --version && \
      pip --version
    
    # Health check
    healthCheckPath: "/"
    
    # Auto deploy on push
    autoDeploy: true