# render.yaml
services:
  - type: web
    name: brain-checker-api
    runtime: python311
    plan: free
    buildCommand: |
      pip install --upgrade pip && \
      pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: OPENROUTER_API_KEY
        scope: run
        sync: false